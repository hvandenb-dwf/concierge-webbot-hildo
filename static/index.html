<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Voicebot</title>
</head>
<body>
  <h2>Stel je vraag aan de voicebot:</h2>
  <input type="text" id="input" placeholder="Typ hier je vraag..." style="width: 300px;" />
  <button onclick="send()">Verstuur</button>

  <h3>Antwoord:</h3>
  <p id="reply"></p>
  <audio id="audio" controls></audio>

  <script>
    async function send() {
      const prompt = document.getElementById("input").value;
      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      document.getElementById("reply").innerText = data.text;
      document.getElementById("audio").src = data.audio_url;
    }
  </script>
</body>
</html>
