<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voicebot Test</title>
</head>
<body>
    <h1>Test de Voicebot</h1>
    <form id="ask-form">
        <label for="question">Stel een vraag:</label>
        <input type="text" id="question" name="question" required />
        <button type="submit">Verstuur</button>
    </form>
    <p id="status"></p>
    <audio id="responseAudio" controls></audio>

    <script>
        const form = document.getElementById('ask-form');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('responseAudio');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            status.textContent = '⏳ Antwoord genereren...';
            audioPlayer.src = '';

            const question = document.getElementById('question').value;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                if (!response.ok) {
                    throw new Error(`Serverfout: ${response.status}`);
                }

                const data = await response.json();
                status.textContent = '✅ Antwoord ontvangen.';
                audioPlayer.src = data.audio_url;
                audioPlayer.play();
            } catch (error) {
                status.textContent = `❌ Fout: ${error.message}`;
            }
        });
    </script>
</body>
</html>
