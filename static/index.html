<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <title>Conciërge Voicebot</title>
</head>
<body>
    <h1>Conciërge</h1>

    <input type="text" id="userInput" placeholder="Stel je vraag..." />
    <button onclick="sendQuestion()">Verstuur</button>

    <p><strong>Antwoord:</strong> <span id="replyText"></span></p>
    <audio id="audioPlayer" controls style="display:none;"></audio>

    <script>
        async function sendQuestion() {
            const input = document.getElementById("userInput").value;

            const response = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: input })
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById("replyText").textContent = data.reply;
